name: Formulasyon-Optimizer Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Kutuphanelerin Kurulmasi
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PyQt6
        pip install numpy
        pip install scipy
        pip install pandas
        pip install matplotlib
        pip install statsmodels
        pip install pyDOE3
        pip install openpyxl
        pip install reportlab
        pip install pillow

    - name: pyDOE3 Veri Dosyalari Yolunu Bul
      id: pydoe3_path
      run: |
        $path = python -c "import pyDOE3; import os; print(os.path.dirname(pyDOE3.__file__))"
        echo "PYDOE3_PATH=$path" >> $env:GITHUB_ENV
        echo "pyDOE3 yolu: $path"
      shell: pwsh

    - name: EXE Olusturma
      run: |
        $pydoe3 = $env:PYDOE3_PATH
        if (Test-Path "opt_icon.ico") {
          python -m PyInstaller --onefile --noconsole `
            --icon=opt_icon.ico `
            --name="Formulasyon_Optimizer" `
            --add-data "$pydoe3;pyDOE3" `
            formulasyon_optimizer.py
        } else {
          python -m PyInstaller --onefile --noconsole `
            --name="Formulasyon_Optimizer" `
            --add-data "$pydoe3;pyDOE3" `
            formulasyon_optimizer.py
        }
      shell: pwsh

    - name: EXE Yukle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Formulasyon_Optimizer
        path: dist/Formulasyon_Optimizer.exe
        retention-days: 30
